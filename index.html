<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Convert Apple Music and Spotify song links between platforms."
    >
    <title>Music Link Handoff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@700&family=Nunito:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="tool" aria-labelledby="app-title">
        <header class="masthead">
          <div>

            <h1 id="app-title" class="bubbly-title">
              <div class="title-bubbles" aria-hidden="true">
                <span class="bubble"></span>
                <span class="bubble"></span>
                <span class="bubble"></span>
                <span class="bubble"></span>
                <span class="bubble"></span>
                <span class="bubble"></span>
                <span class="bubble"></span>
              </div>
              <span class="title-line" id="title-source">Apple Music</span>
              <span class="title-line" id="title-target">to Spotify</span>
            </h1>
          </div>
          <div class="route-chip" aria-label="Conversion route">
            <span id="route-chip-source">Apple</span>
            <span aria-hidden="true">to</span>
            <span id="route-chip-target">Spotify</span>
          </div>
        </header>

        <form class="converter" id="converter-form">


          <div class="field">
            <label for="source-url" id="source-url-label">Apple Music URL</label>
            <div class="url-row">
              <input
                id="source-url"
                name="source-url"
                type="url"
                inputmode="url"
                autocomplete="off"
                spellcheck="false"
                placeholder="https://music.apple.com/..."
                required
              >
              <button class="secondary-button" id="paste-button" type="button">
                Paste
              </button>
            </div>
          </div>

          <div class="action-row">
            <label class="country-field" for="user-country">
              Country
              <span class="select-wrap">
                <select
                  id="user-country"
                  name="user-country"
                  aria-label="Country for music availability"
                >
                  <option value="US" selected>United States</option>
                  <option value="NL">Netherlands</option>
                  <option value="GB">United Kingdom</option>
                  <option value="CA">Canada</option>
                  <option value="AU">Australia</option>
                  <option value="DE">Germany</option>
                  <option value="FR">France</option>
                  <option value="ES">Spain</option>
                  <option value="IT">Italy</option>
                  <option value="BE">Belgium</option>
                  <option value="DK">Denmark</option>
                  <option value="NO">Norway</option>
                  <option value="SE">Sweden</option>
                  <option value="IE">Ireland</option>
                  <option value="BR">Brazil</option>
                  <option value="MX">Mexico</option>
                  <option value="JP">Japan</option>
                  <option value="KR">South Korea</option>
                </select>
              </span>
            </label>
            <button class="primary-button" id="convert-button" type="submit">
              Convert
            </button>
          </div>
        </form>

        <p class="status" id="status" role="status" aria-live="polite"></p>

        <section class="result" id="result" aria-labelledby="result-title" hidden>
          <img class="artwork" id="artwork" alt="">
          <div class="track-copy">
            <p class="result-label" id="result-title">Spotify URL</p>
            <p class="track-title" id="track-title"></p>
            <p class="track-artist" id="track-artist"></p>
            <a class="result-url" id="result-url" href="#" target="_blank" rel="noreferrer"></a>
          </div>
          <div class="result-actions">
            <button class="success-button compact" id="copy-button" type="button">
              Copy
            </button>
            <a class="secondary-link" id="open-button" href="#" target="_blank" rel="noreferrer">
              Open
            </a>
          </div>
        </section>

        <section class="player-panel" id="player-panel" aria-labelledby="player-heading" hidden>
          <div class="player-copy">
            <p class="result-label" id="player-heading">Spotify Playback</p>
            <p class="player-title" id="player-title">Play the matched track here</p>
            <p class="player-note" id="player-status">Connect a Spotify Premium account to use browser playback.</p>
          </div>
          <div class="player-actions">
            <button class="secondary-button compact" id="spotify-connect-button" type="button">
              Connect
            </button>
            <button class="success-button compact" id="spotify-play-button" type="button" disabled>
              Play
            </button>
            <button class="secondary-button compact" id="spotify-pause-button" type="button" disabled>
              Pause
            </button>
            <button class="text-button player-disconnect" id="spotify-disconnect-button" type="button" hidden>
              Disconnect
            </button>
          </div>
        </section>

        <footer class="utility-bar">
          <div class="bookmarklet-group">
            <a class="bookmarklet" id="bookmarklet-link" href="#">Bookmarklet</a>
            <button class="text-button" id="copy-bookmarklet-button" type="button">
              Copy bookmarklet
            </button>
          </div>
          <span class="powered-by">Songlink/Odesli</span>
        </footer>
      </section>
    </main>

    <script src="src/app.js"></script>
  </body>
</html>
